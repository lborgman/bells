<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bell Synthesizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inconsolata:wght@300;400&display=swap');
  :root{--bg:#0a0c10;--sur:#111318;--brd:#1e2230;--acc:#c9a96e;--acc2:#7eb8c9;--acc3:#9b7ec9;--txt:#d4cfc8;--mut:#5a5f70}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:'Inconsolata',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  .container{width:100%;max-width:820px}
  header{text-align:center;margin-bottom:36px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:.08em;color:#ede8df;margin-bottom:6px}
  h1 em{font-style:italic;color:var(--acc)}
  .sub{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--mut)}

  /* Bell selector */
  .bell-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--brd);padding-bottom:0}
  .bell-tab{padding:8px 20px;background:transparent;border:1px solid transparent;border-bottom:none;border-radius:4px 4px 0 0;color:var(--mut);font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.15em;cursor:pointer;transition:all .15s;margin-bottom:-1px}
  .bell-tab.active{border-color:var(--brd);border-bottom-color:var(--sur);background:var(--sur);color:var(--acc)}
  .bell-tab:hover:not(.active){color:var(--txt)}

  .panel{background:var(--sur);border:1px solid var(--brd);border-radius:0 6px 6px 6px;padding:20px;margin-bottom:16px}
  .panel-plain{background:var(--sur);border:1px solid var(--brd);border-radius:6px;padding:20px;margin-bottom:16px}
  .pt{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mut);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .pt::after{content:'';flex:1;height:1px;background:var(--brd)}
  .note{font-size:9px;color:var(--acc3);font-style:italic}

  /* Partial rows */
  .partial-row{display:grid;grid-template-columns:110px 1fr 80px 80px 60px;gap:8px;align-items:center;margin-bottom:10px;padding:8px 10px;border:1px solid var(--brd);border-radius:4px;background:rgba(0,0,0,.2)}
  .partial-row.inactive{opacity:.4}
  .pr-label{font-size:10px;color:var(--acc2);letter-spacing:.05em}
  .pr-freq{font-size:9px;color:var(--mut)}
  .pr-bar{height:3px;background:var(--brd);border-radius:2px;position:relative;cursor:pointer}
  .pr-fill{height:100%;border-radius:2px;pointer-events:none}
  .pr-val{font-size:10px;color:var(--acc);text-align:right}
  .pr-t60{font-size:9px;color:var(--mut);text-align:right}
  .pr-toggle{width:18px;height:18px;border-radius:50%;border:1px solid var(--brd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mut);transition:all .15s;flex-shrink:0}
  .pr-toggle.on{border-color:var(--acc);background:rgba(201,169,110,.15);color:var(--acc)}

  .cg2{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
  @media(max-width:520px){.cg2{grid-template-columns:1fr}.partial-row{grid-template-columns:90px 1fr 60px 60px 24px}}
  .cr{display:flex;flex-direction:column;gap:5px}
  .cr label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);display:flex;justify-content:space-between}
  .cr label span{color:var(--acc);font-size:11px}
  input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--brd);border-radius:1px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--acc);cursor:pointer}

  .strike-zone{display:flex;justify-content:center;margin-bottom:24px;position:relative}
  .bell-btn{width:110px;height:110px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 40% 35%,#2a2618,#13110a);box-shadow:0 0 0 1px var(--brd),0 0 40px rgba(201,169,110,.08);transition:box-shadow .08s,transform .08s;outline:none;display:flex;align-items:center;justify-content:center}
  .bell-btn:hover{box-shadow:0 0 0 1px rgba(201,169,110,.4),0 0 60px rgba(201,169,110,.2)}
  .bell-btn.ringing{transform:scale(.94);box-shadow:0 0 0 1px var(--acc),0 0 80px rgba(201,169,110,.4)}
  .bell-icon{width:46px;height:46px;fill:var(--acc);filter:drop-shadow(0 0 8px rgba(201,169,110,.4))}
  .ripple{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;border-radius:50%;border:1px solid var(--acc);opacity:0;pointer-events:none}
  .ripple.active{animation:ro 2s ease-out forwards}
  @keyframes ro{0%{transform:translate(-50%,-50%) scale(1);opacity:.5}100%{transform:translate(-50%,-50%) scale(5);opacity:0}}

  .sr{display:flex;gap:6px;flex-wrap:wrap}
  .sb{padding:5px 12px;background:transparent;border:1px solid var(--brd);border-radius:3px;color:var(--mut);font-family:'Inconsolata',monospace;font-size:11px;cursor:pointer;transition:all .15s}
  .sb:hover,.sb.active{border-color:var(--acc);color:var(--acc);background:rgba(201,169,110,.07)}
  canvas{width:100%;display:block;border-radius:3px}
  footer{text-align:center;margin-top:24px;font-size:9px;color:var(--mut);letter-spacing:.1em;line-height:2.2}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Bell <em>Synthesis</em> Patch</h1>
    <p class="sub">generalised · spectral model · two bells</p>
  </header>

  <!-- Bell selector tabs -->
  <div class="bell-tabs" id="bellTabs">
    <button class="bell-tab active" data-bell="0">Bowl 1 · 432 Hz</button>
    <button class="bell-tab"        data-bell="1">Bowl 2 · 432 Hz</button>
    <button class="bell-tab"        data-bell="mix">Mixed</button>
  </div>

  <!-- Partials editor (hidden in mix mode) -->
  <div class="panel" id="partialsPanel">
    <div class="pt">Partials <span class="note" style="margin-left:8px">gain · T60 · on/off</span></div>
    <div id="partialRows"></div>
  </div>

  <!-- Mix panel (shown only in mix mode) -->
  <div class="panel" id="mixPanel" style="display:none">
    <div class="pt">Mix <span class="note" style="margin-left:8px">weight per bell · blends gain &amp; T60 at Bell 1 frequencies</span></div>
    <div class="cg2">
      <div class="cr"><label>Bell 1 weight <span id="mix0V">1.00</span></label><input type="range" id="mix0" min="0" max="1" value="1.0" step="0.01"></div>
      <div class="cr"><label>Bell 2 weight <span id="mix1V">0.70</span></label><input type="range" id="mix1" min="0" max="1" value="0.7" step="0.01"></div>
    </div>
  </div>

  <!-- Strike & viz -->
  <div class="strike-zone">
    <div class="ripple" id="r1"></div><div class="ripple" id="r2"></div>
    <button class="bell-btn" id="bellBtn">
      <svg class="bell-icon" viewBox="0 0 24 24">
        <path d="M12 2a1 1 0 0 1 1 1v.5C16.386 4.08 19 6.97 19 10.5V15l1.707 1.707A1 1 0 0 1 20 18.5H4a1 1 0 0 1-.707-1.793L5 15v-4.5C5 6.97 7.614 4.08 11 3.5V3a1 1 0 0 1 1-1zm0 20a2 2 0 0 1-2-2h4a2 2 0 0 1-2 2z"/>
      </svg>
    </button>
  </div>

  <div class="panel-plain">
    <div class="pt">Global</div>
    <div class="cg2">
      <div class="cr"><label>Master gain <span id="mgV">0.55</span></label><input type="range" id="masterGain" min="0.05" max="1.5" value="0.55" step="0.05"></div>
      <div class="cr"><label>Strike noise <span id="nV">0.15</span></label><input type="range" id="noiseAmt" min="0" max="0.5" value="0.15" step="0.01"></div>
      <div class="cr"><label>Pitch shift <span id="psV">1.00×</span></label><input type="range" id="pitchShift" min="0.5" max="2.0" value="1.0" step="0.01"></div>
    </div>
  </div>

  <div class="panel-plain">
    <div class="pt">Play</div>
    <div class="cg2" style="margin-bottom:12px">
      <div class="cr">
        <label>Duration <span id="durV">5</span> s</label>
        <input type="range" id="duration" min="2" max="8" value="5" step="0.5">
      </div>
    </div>
    <div class="sr" style="margin-bottom:12px">
      <button class="sb" id="btnPlay">▶ Play</button>
      <button class="sb" id="btnPause">⏸ Pause</button>
      <button class="sb" id="btnStop">■ Stop</button>
    </div>
    <!-- Progress bar -->
    <div id="progressTrack" style="height:3px;background:var(--brd);border-radius:2px;overflow:hidden">
      <div id="progressFill" style="height:100%;width:0%;background:var(--acc);border-radius:2px;transition:none"></div>
    </div>
  </div>

  <div class="panel-plain" style="padding:12px">
    <canvas id="viz" style="height:60px"></canvas>
  </div>

  <footer>
    Synthetic Tibetan singing bowl model<br>
    <span style="color:var(--acc3)">Click bell or press Space to strike · Play for timed sound</span>
  </footer>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     SCRIPT TAG 1 — DATA · AUDIO ENGINE · SEQUENCER  (Sections 1, 2, 3)
     Isolated scope: cannot see anything declared in Script Tag 2.
     Extraction → ESM module (bell-engine.js):
       1. Copy the contents of this <script> block to bell-engine.js.
       2. Uncomment the export line at the bottom.
       3. In <script type="module"> replace globals with:
            import { createEngine, createMixedEngine, blendBells,
                     createSequencer, PATTERNS, SOURCES, BELLS } from './bell-engine.js';
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
/**
 * @fileoverview Bell synthesis engine — Data, Audio Engine, Sequencer.
 *
 * Intended use: breathing-exercise PWA.
 *   - Inhale cue: strike a bell at its natural pitch.
 *   - Exhale cue: strike the same bell via an engine with pitchShift < 1
 *                 (slightly lower pitch signals the transition to exhale).
 *   - Sound duration is controlled per-strike via durationSec (2–8 s).
 *     Without it the bell rings freely to its natural T60 (tens of seconds).
 *
 * Breathing-exercise usage example:
 * @example
 * const actx        = new AudioContext();
 * const inhale      = createEngine(actx.destination);
 * const exhale      = createEngine(actx.destination, { pitchShift: 0.92 });
 * inhale.strike(BELLS[0], { durationSec: 4 });  // bell in  → 4 s inhale
 * exhale.strike(BELLS[0], { durationSec: 6 });  // bell out → 6 s exhale
 */


// ---------------------------------------------------------------------------
// SECTION 1 — DATA
// ---------------------------------------------------------------------------

/**
 * Maps human-readable bell names to their original source recording filenames.
 * @type {Object.<string, string>}
 */
const SOURCES = {
  'Bowl 1': null,   // synthetic — no source recording
  'Bowl 2': null,
};

/**
 * One spectral component of a bell, measured from a recording by
 * log-linear regression over the full file duration.
 *
 * @typedef {Object} Partial
 * @property {string}      label
 *   Campanology name. One of:
 *   'Prime' | 'Nominal' | 'Quint'
 * @property {number}      f1
 *   Frequency in Hz. Always present.
 * @property {number|null} f2
 *   Second frequency of a doublet pair in Hz, or null for a single tone.
 *   Beat frequency = |f1 − f2|.
 * @property {number}      gain
 *   Relative amplitude. Normalised so the Prime partial = 1.0.
 * @property {number}      t60
 *   Natural decay time in seconds (time for the partial to fall 60 dB).
 *   Fitted from the full recording via log-linear regression.
 * @property {number}      atkMs
 *   Attack ramp duration in milliseconds.
 *   ≤ 5 ms  → instant onset (percussive partials such as Prime).
 *   > 5 ms  → linear swell (models resonance build-up, e.g. Nominal at 70 ms).
 * @property {boolean}     enabled
 *   Whether this partial is active by default.
 */

/**
 * Complete spectral definition of one bell.
 *
 * @typedef {Object} BellDef
 * @property {string}    name     - Display name, e.g. 'Bowl 1 · 432 Hz'.
 * @property {string}    source   - Original recording filename, or null if synthetic.
 * @property {Partial[]} partials - Spectral components, ordered low → high frequency.
 */

/**
 * Synthetic Tibetan singing bowl definitions.
 *
 * Partial ratios follow measured singing bowl acoustics:
 *   Prime    1.00×  — strike note, gentle swell, slow doublet shimmer (~1 Hz)
 *   Nominal  2.00×  — strong octave, warm sustain, core of the "singing" tone
 *   Quint    2.75×  — softer fifth above octave, adds gentle brightness
 *
 * All T60 values are long enough to ring freely but controlled via durationSec
 * in the breathing-exercise PWA. No harsh high partials (no Superquint or
 * Oct·Nominal). Doublet beats are slow (0.8–1.2 Hz) — calming rather than agitating.
 *
 * The first entry is the reference bowl for blending.
 * @type {BellDef[]}
 */
const BELLS = [
  {
    // Bowl 1 — warmer, more fundamental weight
    // Reference pitch 432 Hz (common for meditation contexts).
    // Adjust via pitchShift on createEngine() as needed.
    name: 'Bowl 1 · 432 Hz',
    source: SOURCES['Bowl 1'],
    partials: [
      // Prime — gentle 30 ms swell, 0.8 Hz doublet shimmer
      { label:'Prime',    f1:432.0,  f2:432.8,  gain:1.00, t60:20, atkMs:30,  enabled:true },
      // Nominal — swell over 80 ms, strong and warm, very slow 1.0 Hz shimmer
      { label:'Nominal',  f1:864.0,  f2:865.0,  gain:0.90, t60:25, atkMs:80,  enabled:true },
      // Quint — soft, swells over 60 ms, fades faster
      { label:'Quint',    f1:1188.0, f2:null,   gain:0.25, t60:12, atkMs:60,  enabled:true },
    ],
  },
  {
    // Bowl 2 — slightly brighter, more Nominal presence
    // Same reference pitch, different spectral balance and beat rates.
    name: 'Bowl 2 · 432 Hz',
    source: SOURCES['Bowl 2'],
    partials: [
      // Prime — slightly faster 1.2 Hz shimmer
      { label:'Prime',    f1:432.0,  f2:433.2,  gain:1.00, t60:18, atkMs:25,  enabled:true },
      // Nominal — louder relative to Prime, 0.6 Hz very slow shimmer
      { label:'Nominal',  f1:864.0,  f2:864.6,  gain:1.10, t60:28, atkMs:90,  enabled:true },
      // Quint — a touch brighter
      { label:'Quint',    f1:1188.0, f2:null,   gain:0.30, t60:10, atkMs:50,  enabled:true },
    ],
  },
];


// ---------------------------------------------------------------------------
// SECTION 2 — AUDIO ENGINE
// Pure Web Audio API. No DOM references.
// ---------------------------------------------------------------------------

/** @constant {number} ln(1000) — converts T60 to RC time constant: τ = T60 / LN1000 */
const LN1000 = 6.9078;

/**
 * Schedules a sine oscillator with an exponential decay envelope.
 * Private — called only from within strike().
 *
 * @param {number}   freq    - Frequency in Hz.
 * @param {number}   gain    - Peak amplitude (linear).
 * @param {number}   t60     - Natural decay time in seconds.
 * @param {number}   atkSec  - Attack ramp in seconds (0 = instant).
 * @param {number}   fadeSec - If > 0, overrides natural decay with a short
 *                             fade-out starting at t0 + fadeSec. Used to
 *                             enforce durationSec on each partial.
 * @param {number}   t0      - AudioContext time to begin playback.
 * @param {GainNode} busNode - Destination node in the audio graph.
 * @returns {number} AudioContext time when the oscillator node stops.
 */
function _addOscillator(freq, gain, t60, atkSec, fadeSec, t0, busNode) {
  const actx   = busNode.context;
  const tau    = t60 / LN1000;
  const stopAt = t0 + Math.min(t60 * 2.0, 90);

  const osc = actx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;

  const env = actx.createGain();
  if (atkSec <= 0.005) {
    env.gain.setValueAtTime(gain, t0);
  } else {
    env.gain.setValueAtTime(0.0001, t0);
    env.gain.linearRampToValueAtTime(gain, t0 + atkSec);
  }
  env.gain.setTargetAtTime(0.0001, t0 + Math.max(atkSec, 0.001), tau);

  if (fadeSec > 0) {
    // Controlled fade-out: cancel the natural decay at durationSec and replace
    // it with a short exponential fade (≤ 500 ms, 10% of durationSec).
    const fadeStart = t0 + fadeSec;
    const fadeDur   = Math.min(0.5, fadeSec * 0.1);
    env.gain.cancelScheduledValues(fadeStart);
    env.gain.setTargetAtTime(0.0001, fadeStart, fadeDur / 3);
  }

  osc.connect(env);
  env.connect(busNode);
  osc.start(t0);
  osc.stop(fadeSec > 0 ? t0 + fadeSec + 2 : stopAt);
  return      fadeSec > 0 ? t0 + fadeSec + 2 : stopAt;
}

/**
 * Schedules a bandpass-filtered noise burst modelling the strike transient.
 * Private — called only from within strike().
 *
 * @param {number}   primef1    - Bandpass centre frequency in Hz (tracks pitchShift).
 * @param {number}   noiseAmt   - Noise amplitude scalar (0–0.5).
 * @param {number}   masterGain - Master amplitude scalar.
 * @param {number}   t0         - AudioContext start time.
 * @param {GainNode} busNode    - Destination node in the audio graph.
 */
function _addNoise(primef1, noiseAmt, masterGain, t0, busNode) {
  const actx   = busNode.context;
  const bufLen = Math.ceil(actx.sampleRate * 0.08);
  const nb     = actx.createBuffer(1, bufLen, actx.sampleRate);
  const nd     = nb.getChannelData(0);
  for (let i = 0; i < bufLen; i++) nd[i] = Math.random() * 2 - 1;

  const ns  = actx.createBufferSource(); ns.buffer = nb;
  const nbp = actx.createBiquadFilter();
  nbp.type = 'bandpass';
  nbp.frequency.value = primef1;
  nbp.Q.value = 1.0;

  const ng = actx.createGain();
  ng.gain.setValueAtTime(noiseAmt * masterGain, t0);
  ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.025);

  ns.connect(nbp); nbp.connect(ng); ng.connect(busNode);
  ns.start(t0); ns.stop(t0 + 0.09);
}

/**
 * Options passed to engine.strike().
 *
 * @typedef {Object} StrikeOptions
 * @property {number} [masterGain=0.55]
 *   Overall amplitude scalar (0–1).
 * @property {number} [noiseAmt=0.15]
 *   Strike-noise amplitude (0–0.5). Set to 0 to silence the transient click.
 * @property {number} [offsetSec=0]
 *   Delay before the sound starts, in seconds. Useful for pre-scheduling
 *   a sequence of strikes relative to a shared reference time.
 * @property {number} [durationSec=0]
 *   Controlled fade-out time in seconds after the strike.
 *   0     → bell rings freely to its natural T60 (tens of seconds).
 *   2–8   → recommended range for breathing-exercise inhale/exhale cues.
 *   The bell sounds naturally from the strike onset, then fades smoothly
 *   over ≤ 500 ms beginning at durationSec.
 */

/**
 * A running synthesis engine returned by createEngine or createMixedEngine.
 *
 * @typedef {Object} Engine
 * @property {function(BellDef, StrikeOptions=): void} strike
 *   Synthesises and schedules one bell strike.
 *   Safe to call while a previous strike is still ringing —
 *   strikes accumulate naturally, as on a real bell.
 * @property {AnalyserNode} analyser
 *   Web Audio AnalyserNode on the engine output.
 *   Connect to a waveform or spectrum visualiser.
 */

/**
 * Creates a bell synthesis engine connected to a given audio destination.
 *
 * Each call produces an independent engine with its own internal audio
 * sub-graph. Multiple engines can share the same AudioContext.
 *
 * @param {AudioNode} destination - Web Audio node to connect output to.
 * @param {Object}    [options]
 * @param {number}    [options.pitchShift=1.0]
 *   Frequency multiplier applied uniformly to every partial and to the
 *   strike-noise bandpass centre. Supported range: 0.5–2.0.
 *   The doublet beat frequencies scale proportionally (physically correct).
 *   Breathing-exercise usage: use ~0.85–0.95 for the exhale engine so the
 *   lower pitch cues the transition from inhale to exhale.
 * @param {boolean}   [options.suppressDoublets=false]
 *   When true, only f1 is synthesised for each partial (f2 is ignored).
 *   Set automatically by createMixedEngine() for pitch-shifted constituent
 *   bells, preventing artefact beating between unrelated doublet asymmetries.
 * @returns {Engine}
 */
function createEngine(destination, { pitchShift = 1.0, suppressDoublets = false } = {}) {
  const actx     = destination.context;
  const analyser = actx.createAnalyser();
  analyser.fftSize = 1024;
  const masterBus = actx.createGain();
  masterBus.connect(analyser);
  analyser.connect(destination);

  function strike(bellDef, {
    masterGain  = 0.55,
    noiseAmt    = 0.15,
    offsetSec   = 0,
    durationSec = 0,
  } = {}) {
    if (actx.state === 'suspended') actx.resume();

    const t0      = actx.currentTime + 0.005 + offsetSec;
    const fadeSec = durationSec > 0 ? durationSec : 0;
    const bus     = actx.createGain();
    bus.gain.value = 1;
    bus.connect(masterBus);

    let maxStop = t0 + 1;

    bellDef.partials.forEach(p => {
      if (!p.enabled || p.gain < 0.001) return;
      const atkSec = p.atkMs / 1000;

      // Doublet: two oscillators at f1 (full gain) and f2 (88% gain).
      // suppressDoublets: use only f1 — avoids artefact beating when mixing
      // bells whose doublet asymmetries are physically unrelated.
      const tones = (p.f2 && !suppressDoublets)
        ? [[p.f1 * pitchShift, 1.00], [p.f2 * pitchShift, 0.88]]
        : [[p.f1 * pitchShift, 1.00]];

      tones.forEach(([freq, frac]) => {
        const g    = p.gain * frac * masterGain * 0.3;
        const stop = _addOscillator(freq, g, p.t60, atkSec, fadeSec, t0, bus);
        maxStop = Math.max(maxStop, stop);
      });
    });

    if (noiseAmt > 0.001) {
      const primef1 = bellDef.partials.find(p => p.label === 'Prime')?.f1 ?? 700;
      _addNoise(primef1 * pitchShift, noiseAmt, masterGain, t0, bus);
    }

    setTimeout(() => { try { bus.disconnect(); } catch (_) {} },
      (maxStop - actx.currentTime + 2) * 1000);
  }

  return { strike, analyser };
}


// ---------------------------------------------------------------------------
// SECTION 2b — MIXED ENGINE
// ---------------------------------------------------------------------------

/**
 * Blends the spectral character of multiple BellDefs into one new BellDef.
 *
 * All frequencies (f1, f2, atkMs) come from the first (reference) entry
 * unchanged. For each partial label present in the reference bell, gain
 * and T60 are computed as weighted averages across all entries that carry
 * that label. Each bell's gains are first normalised relative to its own
 * Prime so that bells with different absolute levels contribute proportionally.
 * Partials unique to non-reference bells are silently ignored — they have no
 * corresponding frequency in the reference.
 *
 * @param {Array<{bellDef: BellDef, weight: number}>} entries
 *   Bells to blend. First entry is the reference (supplies all frequencies).
 *   weight: 0.0–1.0, the bell's contribution to the spectral blend.
 * @returns {BellDef} A new BellDef named 'Mixed' with blended gain/T60 values.
 */
function blendBells(entries) {
  const reference = entries[0].bellDef;

  const blendedPartials = reference.partials.map(refPartial => {
    let gainSum = 0, t60Sum = 0, wSum = 0;

    entries.forEach(({ bellDef, weight }) => {
      const match = bellDef.partials.find(p => p.label === refPartial.label);
      if (match && match.enabled) {
        // Normalise each bell's gain relative to its own Prime before averaging,
        // so bells with different absolute levels contribute proportionally.
        const ownPrime = bellDef.partials.find(p => p.label === 'Prime');
        const normGain = ownPrime ? match.gain / ownPrime.gain : match.gain;
        gainSum += normGain * weight;
        t60Sum  += match.t60 * weight;
        wSum    += weight;
      }
    });

    if (wSum === 0) return { ...refPartial }; // unique to reference — keep as-is

    // Re-scale blended gain back relative to reference Prime gain
    const refPrime     = reference.partials.find(p => p.label === 'Prime');
    const refPrimeGain = refPrime ? refPrime.gain : 1.0;

    return {
      ...refPartial,
      gain: (gainSum / wSum) * refPrimeGain,
      t60:   t60Sum  / wSum,
      // atkMs kept from reference: attack shape reflects reference bell geometry
    };
  });

  return { ...reference, name: 'Mixed', partials: blendedPartials };
}

/**
 * Creates an engine that plays a spectral blend of multiple bells.
 *
 * Internally uses a single createEngine() instance — no frequency duplication,
 * no artefact beating between unrelated doublet asymmetries. All frequencies
 * remain those of the first (reference) entry in entries.
 *
 * @param {AudioNode} destination - Web Audio node to connect output to.
 * @param {Array<{bellDef: BellDef, weight: number}>} entries
 *   Bells to blend. First entry is the reference (supplies all frequencies).
 * @returns {Engine}
 */
function createMixedEngine(destination, entries) {
  const blended            = blendBells(entries);
  const { strike: _strike, analyser } = createEngine(destination);

  /**
   * Plays the blended bell. The bellDef argument is intentionally ignored —
   * the spectral blend is fixed at construction time via blendBells().
   * @param {BellDef}       _ignored
   * @param {StrikeOptions} [params]
   */
  function strike(_ignored, params = {}) {
    _strike(blended, params);
  }

  return { strike, analyser };
}


// ---------------------------------------------------------------------------
// SECTION 3 — SEQUENCER
// ---------------------------------------------------------------------------

/**
 * Named timing patterns: arrays of millisecond offsets from the first strike.
 * @type {Object.<string, number[]>}
 */
const PATTERNS = {
  slow:     [0, 3000, 6000, 9000, 12000, 15000],
  carillon: [0, 130, 260, 390, 520, 780, 910, 1040, 1300, 1560, 1820, 2080],
};

/**
 * A running sequencer returned by createSequencer().
 *
 * @typedef {Object} Sequencer
 * @property {function(number[]): void} play
 *   Schedule a pattern of strikes. Any currently running pattern is cancelled first.
 * @property {function(): void}         stop
 *   Cancel all pending strikes immediately.
 * @property {typeof PATTERNS}          PATTERNS
 *   Reference to the named pattern library.
 */

/**
 * Creates a sequencer that calls a strike function on a millisecond-offset pattern.
 * No knowledge of audio or the DOM — depends only on setTimeout / clearTimeout.
 *
 * @param {function(): void} strikeFn
 *   Called once per scheduled strike. Typically a closure:
 *   () => engine.strike(bellDef, { durationSec: 4 })
 * @returns {Sequencer}
 */
function createSequencer(strikeFn) {
  let _ids = [];

  /** @param {number[]} pattern - Array of millisecond offsets from now. */
  function play(pattern) {
    stop();
    pattern.forEach(ms => { _ids.push(setTimeout(strikeFn, ms)); });
  }

  function stop() {
    _ids.forEach(clearTimeout);
    _ids = [];
  }

  return { play, stop, PATTERNS };
}

// export { createEngine, createMixedEngine, blendBells, createSequencer, PATTERNS, SOURCES, BELLS };
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     SCRIPT TAG 2 — UI only  (Section 4)
     Reads BELLS, SOURCES, PATTERNS, createEngine, createSequencer
     from Script Tag 1.  When Tag 1 becomes an ESM module, replace those
     globals with:  import { ... } from './bell-engine.js';
     ═══════════════════════════════════════════════════════════════════════ -->
<script type="module">
// =============================================================================
// SECTION 4 — UI
// All DOM wiring. Calls into Data, Audio Engine, and Sequencer only via their
// public APIs. This is the section that stays in the HTML file when the rest
// moves to an ESM module.
// =============================================================================

let currentBell  = 0;       // index into BELLS, or 'mix'
let engine       = null;
let _engineKey   = null;    // string key to detect when engine needs rebuilding

// ── Audio init (deferred until first gesture) ────────────────────────────────
function _actx() {
  // Reuse existing AudioContext if we have one
  return engine ? engine.analyser.context
    : new (window.AudioContext || window.webkitAudioContext)();
}

function _mixKey() {
  const w0 = document.getElementById('mix0').value;
  const w1 = document.getElementById('mix1').value;
  return `mix:${w0}:${w1}`;
}

function _pitchKey() {
  return `single:${currentBell}:${document.getElementById('pitchShift').value}`;
}

function getEngine() {
  if (currentBell === 'mix') {
    const key = _mixKey();
    if (engine && _engineKey === key) return engine;
    const entries = BELLS.map((bellDef, i) => ({
      bellDef,
      weight: +document.getElementById(`mix${i}`).value,
    }));
    engine     = createMixedEngine(_actx().destination, entries);
    _engineKey = key;
  } else {
    const key = _pitchKey();
    if (engine && _engineKey === key) return engine;
    const pitch = +document.getElementById('pitchShift').value;
    engine     = createEngine(_actx().destination, { pitchShift: pitch });
    _engineKey = key;
  }
  startViz(engine.analyser);
  return engine;
}

// ── Strike helper ─────────────────────────────────────────────────────────────
function getGlobalParams() {
  return {
    masterGain:  +document.getElementById('masterGain').value,
    noiseAmt:    +document.getElementById('noiseAmt').value,
    durationSec: +document.getElementById('duration').value,
  };
}

function doStrike() {
  const bellDef = currentBell === 'mix' ? BELLS[0] : BELLS[currentBell];
  const params  = getGlobalParams();
  getEngine().strike(bellDef, params);
  triggerVisual();
  // Show waveform briefly for manual strikes outside of Play
  if (_playState !== 'playing') {
    _playState = 'playing';
    setTimeout(() => {
      if (_playState === 'playing') { _playState = 'stopped'; _setButtonStates('stopped'); }
    }, params.durationSec * 1000 + 500);
    _setButtonStates('playing');
  }
}

// ── Play / Pause / Stop with progress bar ────────────────────────────────────
let _playState    = 'stopped';  // 'stopped' | 'playing' | 'paused'
let _playStart    = null;       // performance.now() when play began
let _pausedAt     = 0;          // elapsed ms when paused
let _progressRaf  = null;       // requestAnimationFrame handle
let _strikeTimer  = null;       // setTimeout handle for the scheduled strike

function _getDurationMs() {
  return +document.getElementById('duration').value * 1000;
}

function _setProgress(fraction) {
  document.getElementById('progressFill').style.width = (fraction * 100).toFixed(2) + '%';
}

function _setButtonStates(state) {
  document.getElementById('btnPlay') .classList.toggle('active', state === 'playing');
  document.getElementById('btnPause').classList.toggle('active', state === 'paused');
}

function _tickProgress() {
  if (_playState !== 'playing') return;
  const elapsed  = performance.now() - _playStart + _pausedAt;
  const duration = _getDurationMs();
  const fraction = Math.min(elapsed / duration, 1);
  _setProgress(fraction);
  if (fraction < 1) {
    _progressRaf = requestAnimationFrame(_tickProgress);
  } else {
    _playState = 'stopped';
    _pausedAt  = 0;
    _setProgress(1);
    _setButtonStates('stopped');
  }
}

function playBell() {
  if (_playState === 'playing') return;
  if (_playState === 'paused') {
    // Resume: re-strike from the beginning (audio can't be unpaused)
    // and continue the progress bar from where it left off
    _playState = 'playing';
    _playStart = performance.now();
    doStrike();
    _progressRaf = requestAnimationFrame(_tickProgress);
    _setButtonStates('playing');
    return;
  }
  // Fresh start
  stopBell();
  _playState = 'playing';
  _playStart = performance.now();
  _pausedAt  = 0;
  doStrike();
  _progressRaf = requestAnimationFrame(_tickProgress);
  _setButtonStates('playing');
}

function pauseBell() {
  if (_playState !== 'playing') return;
  _playState = 'paused';
  _pausedAt += performance.now() - _playStart;
  cancelAnimationFrame(_progressRaf);
  clearTimeout(_strikeTimer);
  _setButtonStates('paused');
}

function stopBell() {
  _playState = 'stopped';
  _pausedAt  = 0;
  cancelAnimationFrame(_progressRaf);
  clearTimeout(_strikeTimer);
  _setProgress(0);
  _setButtonStates('stopped');
}

// ── Bell selector ────────────────────────────────────────────────────────────
function loadBell(idx) {
  currentBell = idx;
  engine = null; _engineKey = null;  // force engine rebuild on next strike
  document.querySelectorAll('.bell-tab')
    .forEach(t => t.classList.toggle('active', t.dataset.bell === String(idx)));
  const isMix = idx === 'mix';
  document.getElementById('partialsPanel').style.display = isMix ? 'none' : '';
  document.getElementById('mixPanel').style.display      = isMix ? ''     : 'none';
  if (!isMix) renderPartials();
}

// ── Partials editor ──────────────────────────────────────────────────────────
function renderPartials() {
  const bell      = BELLS[currentBell];
  const container = document.getElementById('partialRows');
  container.innerHTML = '';
  const COLORS = ['#c9a96e', '#7eb8c9', '#9b7ec9', '#6eb89b', '#c96e7e'];

  bell.partials.forEach((p, i) => {
    const col     = COLORS[i % COLORS.length];
    const freqStr = p.f2
      ? `${p.f1.toFixed(2)} + ${p.f2.toFixed(2)} Hz  Δ${Math.abs(p.f1 - p.f2).toFixed(2)} Hz`
      : `${p.f1.toFixed(2)} Hz`;
    const t60Str  = p.t60 < 1 ? `${(p.t60 * 1000).toFixed(0)}ms` : `${p.t60}s`;

    const row = document.createElement('div');
    row.className = 'partial-row' + (p.enabled ? '' : ' inactive');
    row.id = `pr${i}`;
    row.innerHTML = `
      <div>
        <div class="pr-label">${p.label}</div>
        <div class="pr-freq">${freqStr}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <div class="pr-bar" id="gainBar${i}" title="Gain">
          <div class="pr-fill" id="gainFill${i}" style="background:${col};width:${Math.min(p.gain / 2 * 100, 100)}%"></div>
        </div>
        <div class="pr-bar" id="t60Bar${i}" title="T60">
          <div class="pr-fill" id="t60Fill${i}" style="background:${col}55;width:${Math.min(p.t60 / 200 * 100, 100)}%"></div>
        </div>
      </div>
      <div class="pr-val" id="gainVal${i}">${p.gain.toFixed(2)}</div>
      <div class="pr-t60" id="t60Val${i}">T60 ${t60Str}</div>
      <button class="pr-toggle ${p.enabled ? 'on' : ''}" id="tog${i}"
              title="Enable/disable">✓</button>
    `;
    container.appendChild(row);

    document.getElementById(`tog${i}`).addEventListener('click', () => togglePartial(i));
    makeBarDraggable(document.getElementById(`gainBar${i}`), 0, 2,
      v => { bell.partials[i].gain = v; _refreshPartialRow(i); });
    makeBarDraggable(document.getElementById(`t60Bar${i}`), 0.05, 200,
      v => { bell.partials[i].t60  = v; _refreshPartialRow(i); });
  });
}

function _refreshPartialRow(i) {
  const p      = BELLS[currentBell].partials[i];
  const t60Str = p.t60 < 1 ? `${(p.t60 * 1000).toFixed(0)}ms` : `${p.t60.toFixed(0)}s`;
  document.getElementById(`gainFill${i}`).style.width = Math.min(p.gain / 2 * 100, 100) + '%';
  document.getElementById(`t60Fill${i}`).style.width  = Math.min(p.t60 / 200 * 100, 100) + '%';
  document.getElementById(`gainVal${i}`).textContent  = p.gain.toFixed(2);
  document.getElementById(`t60Val${i}`).textContent   = 'T60 ' + t60Str;
}

function togglePartial(i) {
  const p = BELLS[currentBell].partials[i];
  p.enabled = !p.enabled;
  document.getElementById(`pr${i}`).className  = 'partial-row' + (p.enabled ? '' : ' inactive');
  document.getElementById(`tog${i}`).className = 'pr-toggle'   + (p.enabled ? ' on' : '');
}

function makeBarDraggable(el, min, max, onChange) {
  function update(e) {
    const rect = el.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    onChange(min + x * (max - min));
  }
  el.addEventListener('mousedown', e => {
    update(e);
    const onMove = e2 => update(e2);
    const onUp   = ()  => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
  el.addEventListener('touchstart', e => { e.preventDefault(); update(e); }, { passive: false });
  el.addEventListener('touchmove',  e => { e.preventDefault(); update(e); }, { passive: false });
}

// ── Global control labels ────────────────────────────────────────────────────
document.getElementById('masterGain').addEventListener('input', function () {
  document.getElementById('mgV').textContent = parseFloat(this.value).toFixed(2);
});
document.getElementById('noiseAmt').addEventListener('input', function () {
  document.getElementById('nV').textContent = parseFloat(this.value).toFixed(2);
});
document.getElementById('pitchShift').addEventListener('input', function () {
  document.getElementById('psV').textContent = parseFloat(this.value).toFixed(2) + '×';
});
document.getElementById('mix0').addEventListener('input', function () {
  document.getElementById('mix0V').textContent = parseFloat(this.value).toFixed(2);
});
document.getElementById('mix1').addEventListener('input', function () {
  document.getElementById('mix1V').textContent = parseFloat(this.value).toFixed(2);
});

// ── Waveform visualiser ──────────────────────────────────────────────────────
function startViz(analyser) {
  const canvas = document.getElementById('viz');
  const ctx    = canvas.getContext('2d');
  const dpr    = window.devicePixelRatio || 1;
  canvas.width  = canvas.offsetWidth  * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  const W = canvas.width, H = canvas.height;
  const buf = new Uint8Array(analyser.frequencyBinCount);

  (function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(201,169,110,.7)';
    ctx.lineWidth   = 1.5;
    ctx.shadowColor = 'rgba(201,169,110,.25)';
    ctx.shadowBlur  = 4;
    ctx.beginPath();

    if (_playState === 'playing') {
      // Live waveform
      analyser.getByteTimeDomainData(buf);
      buf.forEach((v, i) => {
        const x = i * W / buf.length;
        const y = v / 255 * H;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
    } else {
      // Flat centre line when paused or stopped
      ctx.moveTo(0,   H / 2);
      ctx.lineTo(W,   H / 2);
    }

    ctx.stroke();
  })();
}

// ── Strike visual feedback ───────────────────────────────────────────────────
let _rippleIdx = 0;
function triggerVisual() {
  const btn = document.getElementById('bellBtn');
  btn.classList.add('ringing');
  setTimeout(() => btn.classList.remove('ringing'), 150);
  const r = document.getElementById('r' + (_rippleIdx++ % 2 + 1));
  r.classList.remove('active');
  void r.offsetWidth; // force reflow to restart animation
  r.classList.add('active');
}

// ── Event bindings ───────────────────────────────────────────────────────────

// Bell selector tabs
document.getElementById('bellTabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-bell]');
  if (!btn) return;
  const val = btn.dataset.bell;
  loadBell(val === 'mix' ? 'mix' : +val);
});

// Play controls
document.getElementById('btnPlay') .addEventListener('click', playBell);
document.getElementById('btnPause').addEventListener('click', pauseBell);
document.getElementById('btnStop') .addEventListener('click', stopBell);

// Duration slider label
document.getElementById('duration').addEventListener('input', function () {
  document.getElementById('durV').textContent = this.value;
});

// Bell button and keyboard — single strike, no progress tracking
document.getElementById('bellBtn').addEventListener('click', doStrike);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    doStrike();
  }
});

// ── Initialise ───────────────────────────────────────────────────────────────
renderPartials();
</script>
</body>
</html>
