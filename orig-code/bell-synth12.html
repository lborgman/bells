<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bell Synthesizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inconsolata:wght@300;400&display=swap');
  :root{--bg:#0a0c10;--sur:#111318;--brd:#1e2230;--acc:#c9a96e;--acc2:#7eb8c9;--acc3:#9b7ec9;--txt:#d4cfc8;--mut:#5a5f70}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:'Inconsolata',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  .container{width:100%;max-width:820px}
  header{text-align:center;margin-bottom:36px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:.08em;color:#ede8df;margin-bottom:6px}
  h1 em{font-style:italic;color:var(--acc)}
  .sub{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--mut)}

  /* Bell selector */
  .bell-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--brd);padding-bottom:0}
  .bell-tab{padding:8px 20px;background:transparent;border:1px solid transparent;border-bottom:none;border-radius:4px 4px 0 0;color:var(--mut);font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.15em;cursor:pointer;transition:all .15s;margin-bottom:-1px}
  .bell-tab.active{border-color:var(--brd);border-bottom-color:var(--sur);background:var(--sur);color:var(--acc)}
  .bell-tab:hover:not(.active){color:var(--txt)}

  .panel{background:var(--sur);border:1px solid var(--brd);border-radius:0 6px 6px 6px;padding:20px;margin-bottom:16px}
  .panel-plain{background:var(--sur);border:1px solid var(--brd);border-radius:6px;padding:20px;margin-bottom:16px}
  .pt{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mut);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .pt::after{content:'';flex:1;height:1px;background:var(--brd)}
  .note{font-size:9px;color:var(--acc3);font-style:italic}

  /* Partial rows */
  .partial-row{display:grid;grid-template-columns:110px 1fr 80px 80px 60px;gap:8px;align-items:center;margin-bottom:10px;padding:8px 10px;border:1px solid var(--brd);border-radius:4px;background:rgba(0,0,0,.2)}
  .partial-row.inactive{opacity:.4}
  .pr-label{font-size:10px;color:var(--acc2);letter-spacing:.05em}
  .pr-freq{font-size:9px;color:var(--mut)}
  .pr-bar{height:3px;background:var(--brd);border-radius:2px;position:relative;cursor:pointer}
  .pr-fill{height:100%;border-radius:2px;pointer-events:none}
  .pr-val{font-size:10px;color:var(--acc);text-align:right}
  .pr-t60{font-size:9px;color:var(--mut);text-align:right}
  .pr-toggle{width:18px;height:18px;border-radius:50%;border:1px solid var(--brd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mut);transition:all .15s;flex-shrink:0}
  .pr-toggle.on{border-color:var(--acc);background:rgba(201,169,110,.15);color:var(--acc)}

  .cg2{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
  @media(max-width:520px){.cg2{grid-template-columns:1fr}.partial-row{grid-template-columns:90px 1fr 60px 60px 24px}}
  .cr{display:flex;flex-direction:column;gap:5px}
  .cr label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);display:flex;justify-content:space-between}
  .cr label span{color:var(--acc);font-size:11px}
  input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--brd);border-radius:1px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--acc);cursor:pointer}

  .strike-zone{display:flex;justify-content:center;margin-bottom:24px;position:relative}
  .bell-btn{width:110px;height:110px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 40% 35%,#2a2618,#13110a);box-shadow:0 0 0 1px var(--brd),0 0 40px rgba(201,169,110,.08);transition:box-shadow .08s,transform .08s;outline:none;display:flex;align-items:center;justify-content:center}
  .bell-btn:hover{box-shadow:0 0 0 1px rgba(201,169,110,.4),0 0 60px rgba(201,169,110,.2)}
  .bell-btn.ringing{transform:scale(.94);box-shadow:0 0 0 1px var(--acc),0 0 80px rgba(201,169,110,.4)}
  .bell-icon{width:46px;height:46px;fill:var(--acc);filter:drop-shadow(0 0 8px rgba(201,169,110,.4))}
  .ripple{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;border-radius:50%;border:1px solid var(--acc);opacity:0;pointer-events:none}
  .ripple.active{animation:ro 2s ease-out forwards}
  @keyframes ro{0%{transform:translate(-50%,-50%) scale(1);opacity:.5}100%{transform:translate(-50%,-50%) scale(5);opacity:0}}

  .sr{display:flex;gap:6px;flex-wrap:wrap}
  .sb{padding:5px 12px;background:transparent;border:1px solid var(--brd);border-radius:3px;color:var(--mut);font-family:'Inconsolata',monospace;font-size:11px;cursor:pointer;transition:all .15s}
  .sb:hover,.sb.active{border-color:var(--acc);color:var(--acc);background:rgba(201,169,110,.07)}
  canvas{width:100%;display:block;border-radius:3px}
  footer{text-align:center;margin-top:24px;font-size:9px;color:var(--mut);letter-spacing:.1em;line-height:2.2}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Bell <em>Synthesis</em> Patch</h1>
    <p class="sub">generalised · spectral model · two bells</p>
  </header>

  <!-- Bell selector tabs -->
  <div class="bell-tabs">
    <button class="bell-tab active" onclick="loadBell(0)">Bell 1 · 621 Hz</button>
    <button class="bell-tab"        onclick="loadBell(1)">Bell 2 · 694 Hz</button>
  </div>

  <!-- Partials editor -->
  <div class="panel" id="partialsPanel">
    <div class="pt">Partials <span class="note" style="margin-left:8px">gain · T60 · on/off</span></div>
    <div id="partialRows"></div>
  </div>

  <!-- Strike & viz -->
  <div class="strike-zone">
    <div class="ripple" id="r1"></div><div class="ripple" id="r2"></div>
    <button class="bell-btn" id="bellBtn">
      <svg class="bell-icon" viewBox="0 0 24 24">
        <path d="M12 2a1 1 0 0 1 1 1v.5C16.386 4.08 19 6.97 19 10.5V15l1.707 1.707A1 1 0 0 1 20 18.5H4a1 1 0 0 1-.707-1.793L5 15v-4.5C5 6.97 7.614 4.08 11 3.5V3a1 1 0 0 1 1-1zm0 20a2 2 0 0 1-2-2h4a2 2 0 0 1-2 2z"/>
      </svg>
    </button>
  </div>

  <div class="panel-plain">
    <div class="pt">Global</div>
    <div class="cg2">
      <div class="cr"><label>Master gain <span id="mgV">0.55</span></label><input type="range" id="masterGain" min="0.05" max="1.5" value="0.55" step="0.05"></div>
      <div class="cr"><label>Strike noise <span id="nV">0.15</span></label><input type="range" id="noiseAmt" min="0" max="0.5" value="0.15" step="0.01"></div>
    </div>
  </div>

  <div class="panel-plain">
    <div class="pt">Sequence</div>
    <div class="sr">
      <button class="sb" onclick="doStrike()">Single</button>
      <button class="sb" id="sqSlow"    onclick="playSeq('slow')">Slow toll</button>
      <button class="sb" id="sqCar"     onclick="playSeq('carillon')">Carillon</button>
      <button class="sb" onclick="stopSeq()">■ Stop</button>
    </div>
  </div>

  <div class="panel-plain" style="padding:12px">
    <canvas id="viz" style="height:60px"></canvas>
  </div>

  <footer>
    Spectral model · partials fitted from original recordings<br>
    <span style="color:var(--acc3)">Click bell or press Space</span>
  </footer>
</div>

<script>
const LN1000 = 6.9078;

// ── Bell definitions — all values measured from recordings ──────────────────
//
// Each partial: { label, f1, f2 (optional doublet), gain, t60, atkMs, enabled }
// gain is relative (normalised so loudest partial = 1.0)
// t60 from log-linear fit over full file steady-state region
// f2 present = doublet, beat freq = |f1-f2|

const BELLS = [
  {
    name: 'Bell 1 · 621 Hz',
    partials: [
      // Low doublet — 2.25 Hz direct beat, fast single-strike transient
      { label:'Low thud',    f1:222.45, f2:220.20, gain:0.50, t60:0.4,  atkMs:4,  enabled:true  },
      // Body doublet — 8.2 Hz beat, dominant at onset
      { label:'Body',        f1:621.00, f2:612.80, gain:1.00, t60:48,   atkMs:4,  enabled:true  },
      // Shimmer doublet — 6 Hz beat, swells 70ms, dominates sustain
      { label:'Shimmer',     f1:1153.6, f2:1147.6, gain:1.55, t60:59,   atkMs:70, enabled:true  },
      // Clang — bright, very long decay
      { label:'Clang',       f1:3382.0, f2:null,   gain:0.70, t60:145,  atkMs:4,  enabled:true  },
      // Brief upper transient
      { label:'Transient',   f1:1796.0, f2:null,   gain:0.20, t60:0.15, atkMs:4,  enabled:true  },
    ]
  },
  {
    name: 'Bell 2 · 694 Hz',
    partials: [
      // Body doublet — 2.02 Hz direct beat
      { label:'Body',        f1:694.22, f2:696.25, gain:1.00, t60:48,   atkMs:4,  enabled:true  },
      // Shimmer — ~1924Hz, swells, dominant in sustain  
      { label:'Shimmer',     f1:1924.8, f2:null,   gain:1.40, t60:29,   atkMs:50, enabled:true  },
      // Clang
      { label:'Clang',       f1:3580.4, f2:null,   gain:0.35, t60:23,   atkMs:4,  enabled:true  },
      // Sub / hum
      { label:'Hum',         f1:60.0,   f2:null,   gain:0.15, t60:200,  atkMs:4,  enabled:true  },
    ]
  }
];

let currentBell = 0;

// ── Partial row UI ──────────────────────────────────────────────────────────
function renderPartials() {
  const bell = BELLS[currentBell];
  const container = document.getElementById('partialRows');
  container.innerHTML = '';

  bell.partials.forEach((p, i) => {
    const colors = ['#c9a96e','#7eb8c9','#9b7ec9','#6eb89b','#c96e7e'];
    const col = colors[i % colors.length];
    const freqStr = p.f2 ? `${p.f1.toFixed(2)} + ${p.f2.toFixed(2)} Hz  Δ${Math.abs(p.f1-p.f2).toFixed(2)}Hz` : `${p.f1.toFixed(2)} Hz`;
    const t60Str = p.t60 < 1 ? `${(p.t60*1000).toFixed(0)}ms` : `${p.t60}s`;

    const row = document.createElement('div');
    row.className = 'partial-row' + (p.enabled ? '' : ' inactive');
    row.id = `pr${i}`;
    row.innerHTML = `
      <div>
        <div class="pr-label">${p.label}</div>
        <div class="pr-freq">${freqStr}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <div class="pr-bar" id="gainBar${i}" title="Gain">
          <div class="pr-fill" id="gainFill${i}" style="background:${col};width:${Math.min(p.gain/2*100,100)}%"></div>
        </div>
        <div class="pr-bar" id="t60Bar${i}" title="T60">
          <div class="pr-fill" id="t60Fill${i}" style="background:${col}55;width:${Math.min(p.t60/200*100,100)}%"></div>
        </div>
      </div>
      <div class="pr-val" id="gainVal${i}">${p.gain.toFixed(2)}</div>
      <div class="pr-t60" id="t60Val${i}">T60 ${t60Str}</div>
      <button class="pr-toggle ${p.enabled?'on':''}" id="tog${i}" onclick="togglePartial(${i})" title="Enable/disable">✓</button>
    `;
    container.appendChild(row);

    // Drag on gain bar
    makeBarDraggable(document.getElementById(`gainBar${i}`), 0, 2,
      v => { bell.partials[i].gain = v; updatePartialDisplay(i); });
    makeBarDraggable(document.getElementById(`t60Bar${i}`), 0.05, 200,
      v => { bell.partials[i].t60 = v; updatePartialDisplay(i); });
  });
}

function updatePartialDisplay(i) {
  const p = BELLS[currentBell].partials[i];
  const t60Str = p.t60 < 1 ? `${(p.t60*1000).toFixed(0)}ms` : `${p.t60.toFixed(0)}s`;
  document.getElementById(`gainFill${i}`).style.width = Math.min(p.gain/2*100,100)+'%';
  document.getElementById(`t60Fill${i}`).style.width  = Math.min(p.t60/200*100,100)+'%';
  document.getElementById(`gainVal${i}`).textContent  = p.gain.toFixed(2);
  document.getElementById(`t60Val${i}`).textContent   = 'T60 '+t60Str;
}

function togglePartial(i) {
  const p = BELLS[currentBell].partials[i];
  p.enabled = !p.enabled;
  document.getElementById(`pr${i}`).className = 'partial-row'+(p.enabled?'':' inactive');
  document.getElementById(`tog${i}`).className = 'pr-toggle'+(p.enabled?' on':'');
}

function makeBarDraggable(el, min, max, onChange) {
  function update(e) {
    const rect = el.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, ((e.touches?e.touches[0].clientX:e.clientX) - rect.left) / rect.width));
    onChange(min + x * (max - min));
  }
  el.addEventListener('mousedown', e => {
    update(e);
    const mm = e2 => update(e2);
    const mu = () => { window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
    window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
  });
  el.addEventListener('touchstart', e => { e.preventDefault(); update(e); }, {passive:false});
  el.addEventListener('touchmove',  e => { e.preventDefault(); update(e); }, {passive:false});
}

function loadBell(idx) {
  currentBell = idx;
  document.querySelectorAll('.bell-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  renderPartials();
}

// ── Audio ───────────────────────────────────────────────────────────────────
let actx = null, analyser = null, masterNode = null;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = actx.createAnalyser(); analyser.fftSize = 1024;
  masterNode = actx.createGain();
  masterNode.connect(analyser); analyser.connect(actx.destination);
  startViz();
}

function strikeBell(offset = 0) {
  initAudio();
  if (actx.state === 'suspended') actx.resume();
  const t0 = actx.currentTime + 0.005 + offset;
  const master = +document.getElementById('masterGain').value;
  const noiseAmt = +document.getElementById('noiseAmt').value;
  const bell = BELLS[currentBell];

  const sg = actx.createGain(); sg.gain.value = 1; sg.connect(masterNode);

  let maxStop = t0 + 1;

  bell.partials.forEach(p => {
    if (!p.enabled || p.gain < 0.001) return;
    const tau = p.t60 / LN1000;
    const atkSec = p.atkMs / 1000;
    const stopAt = t0 + Math.min(p.t60 * 2.0, 90);
    maxStop = Math.max(maxStop, stopAt);

    const freqs = p.f2 ? [[p.f1, 1.0],[p.f2, 0.88]] : [[p.f1, 1.0]];
    freqs.forEach(([freq, frac]) => {
      const osc = actx.createOscillator();
      osc.type = 'sine'; osc.frequency.value = freq;
      const env = actx.createGain();
      const g = p.gain * frac * master * 0.3;
      if (atkSec <= 0.005) {
        env.gain.setValueAtTime(g, t0);
      } else {
        env.gain.setValueAtTime(0.0001, t0);
        env.gain.linearRampToValueAtTime(g, t0 + atkSec);
      }
      env.gain.setTargetAtTime(0.0001, t0 + Math.max(atkSec, 0.001), tau);
      osc.connect(env); env.connect(sg);
      osc.start(t0); osc.stop(stopAt);
    });
  });

  // Strike noise
  if (noiseAmt > 0.001) {
    const nb = actx.createBuffer(1, Math.ceil(actx.sampleRate*0.08), actx.sampleRate);
    const nd = nb.getChannelData(0);
    for (let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
    const ns = actx.createBufferSource(); ns.buffer = nb;
    const nbp = actx.createBiquadFilter(); nbp.type='bandpass';
    // Centre noise on fundamental
    nbp.frequency.value = bell.partials.find(p=>p.label==='Body')?.f1 || 700;
    nbp.Q.value = 1.0;
    const ng = actx.createGain();
    ng.gain.setValueAtTime(noiseAmt*master, t0);
    ng.gain.exponentialRampToValueAtTime(0.0001, t0+0.025);
    ns.connect(nbp); nbp.connect(ng); ng.connect(sg);
    ns.start(t0); ns.stop(t0+0.09);
  }

  setTimeout(() => { try { sg.disconnect(); } catch(e) {} }, (maxStop - actx.currentTime + 2)*1000);
}

// ── Waveform ─────────────────────────────────────────────────────────────────
function startViz() {
  const canvas = document.getElementById('viz');
  const c = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  canvas.width = canvas.offsetWidth*dpr; canvas.height = canvas.offsetHeight*dpr;
  const W=canvas.width, H=canvas.height;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  (function draw(){
    requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(buf);
    c.clearRect(0,0,W,H);
    c.strokeStyle='rgba(201,169,110,.7)'; c.lineWidth=1.5;
    c.shadowColor='rgba(201,169,110,.25)'; c.shadowBlur=4;
    c.beginPath();
    buf.forEach((v,i)=>{ const x=i*W/buf.length,y=v/255*H; i?c.lineTo(x,y):c.moveTo(x,y); });
    c.stroke();
  })();
}

// ── Global controls ──────────────────────────────────────────────────────────
document.getElementById('masterGain').addEventListener('input', function(){
  document.getElementById('mgV').textContent = parseFloat(this.value).toFixed(2);
});
document.getElementById('noiseAmt').addEventListener('input', function(){
  document.getElementById('nV').textContent = parseFloat(this.value).toFixed(2);
});

// ── Strike / visual ──────────────────────────────────────────────────────────
let rt=0;
function triggerVisual() {
  const btn = document.getElementById('bellBtn');
  btn.classList.add('ringing'); setTimeout(()=>btn.classList.remove('ringing'),150);
  const r = document.getElementById('r'+(rt++%2+1));
  r.classList.remove('active'); void r.offsetWidth; r.classList.add('active');
}
function doStrike(offset=0) { strikeBell(offset); if(!offset) triggerVisual(); }

let sqIds=[];
const SEQS={
  slow:[0,3000,6000,9000,12000,15000],
  carillon:[0,130,260,390,520,780,910,1040,1300,1560,1820,2080],
};
function playSeq(name) {
  stopSeq();
  document.getElementById('sq'+name[0].toUpperCase()+name.slice(1))?.classList.add('active');
  SEQS[name].forEach(ms=>sqIds.push(setTimeout(()=>{strikeBell();triggerVisual();},ms)));
}
function stopSeq() {
  sqIds.forEach(clearTimeout); sqIds=[];
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('active'));
}

document.getElementById('bellBtn').addEventListener('click',()=>doStrike());
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target===document.body){e.preventDefault();doStrike();}
});

// ── Init ─────────────────────────────────────────────────────────────────────
renderPartials();
</script>
</body>
</html>
